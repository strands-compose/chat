services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword  # pragma: allowlist secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://chatuser:chatpassword@postgres:5432/chatdb  # pragma: allowlist secret
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
