[alembic]
# path to migration scripts.
# Uses importlib package:subdirectory format so this resolves correctly whether
# the package is installed as editable (local dev) or as a wheel (Docker runtime).
script_location = strands_compose_chat.db:migrations

# prepended to sys.path so the app package is importable from env.py
prepend_sys_path = .

# NOTE: sqlalchemy.url is intentionally not set here. It is provided at runtime
# in env.py from Settings.DATABASE_URL (the single source of truth).

# Logging configuration — REQUIRED: env.py calls fileConfig() on this file.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
